<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>last's player</title>
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>

  <div class="titlebar">
    <div class="titlebar-drag">
      <span class="app-icon">💿</span>
      <span class="app-name">last's player</span>
    </div>
    <div class="window-controls">
      <button class="wc-btn minimize" onclick="minimizeWindow()"></button>
      <button class="wc-btn maximize" onclick="maximizeWindow()"></button>
      <button class="wc-btn close"    onclick="closeWindow()"></button>
    </div>
  </div>

  <div class="app">

    <!-- LEFT PANEL: cover + controls + playlists -->
    <div class="left-panel">

      <div class="cover-volume-row">
        <div class="cover-wrap">
          <div class="cover-art" id="coverArt">
            <div class="cover-placeholder">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                <path d="M9 18V5l12-2v13"/>
                <circle cx="6" cy="18" r="3"/>
                <circle cx="18" cy="16" r="3"/>
              </svg>
            </div>
          </div>
        </div>
        <div class="vol-col">
          <div class="vol-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            </svg>
          </div>
          <div class="vol-track" id="volTrack">
            <div class="vol-fill" id="volFill">
              <div class="vol-thumb"></div>
            </div>
          </div>
          <div class="vol-icon muted">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Song info -->
      <div class="song-info">
        <div class="song-name" id="songName">No song playing</div>
        <div class="song-meta">
          <span id="artistName">—</span>
          <span class="sep">•</span>
          <span id="genreName">—</span>
        </div>
      </div>

      <!-- Progress bar -->
      <div class="progress-section">
        <div class="prog-track" id="progressTrack">
          <div class="prog-fill" id="progressFill">
            <div class="prog-thumb"></div>
          </div>
        </div>
        <div class="prog-times">
          <span id="currentTime">0:00</span>
          <span id="totalTime">0:00</span>
        </div>
      </div>

      <!-- Media Controls -->
      <div class="controls-section">
        <div class="ctrl-row-top">
          <!-- Cogwheel now opens metadata editor for current track -->
          <button class="c-btn" onclick="openSettingsMenu(event)" title="Edit Track Metadata">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
          <button class="c-btn" onclick="prevSong()" title="Previous">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="19 20 9 12 19 4 19 20"/>
              <line x1="5" y1="19" x2="5" y2="5"/>
            </svg>
          </button>
          <button class="play-btn" id="playBtn" onclick="togglePlay()">
            <svg id="playIcon" viewBox="0 0 24 24" fill="white" stroke="none">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
          </button>
          <button class="c-btn" onclick="nextSong()" title="Next">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="5 4 15 12 5 20 5 4"/>
              <line x1="19" y1="5" x2="19" y2="19"/>
            </svg>
          </button>
          <!-- Scribe / Lyrics button -->
          <button class="c-btn scribe-btn" id="scribeBtn" onclick="toggleLyricsView()" title="No lyrics scribes for this track">
            <svg viewBox="0 0 122.61 122.88" fill="currentColor" stroke="none" width="15" height="15">
              <path fill-rule="evenodd" clip-rule="evenodd" d="M112.67,9.95C106.04,3.32,97.35,0,88.65,0c-8.69,0-17.38,3.32-24.01,9.95c-1.71,1.71-3.2,3.56-4.47,5.51 c0.69,9.51,7.69,20.07,16.83,28.77c9.44,8.97,21.04,15.85,30.4,17.55c0.2,0.04,0.4,0.07,0.6,0.1c1.64-1.14,3.2-2.44,4.66-3.9 c6.63-6.63,9.95-15.32,9.95-24.01C122.61,25.27,119.3,16.58,112.67,9.95L112.67,9.95z M4.72,113.63c-1.49,1.6-2.64,3.42-3.5,5.44 c-1.74,4.07-2.05,4.67,2.05,2.78c2.14-0.99,4.11-2.25,5.86-3.81c1.87,1.74,3.63,2.64,5.66,2.9c2.08,0.27,4.17-0.19,6.82-1.1 c8.65-2.98,38.46-27.36,57.02-42.54c4.76-3.89,8.75-7.16,11.6-9.41c3.55-0.16,7.07-0.88,10.44-2.15 c-9.07-3.33-18.96-9.77-27.24-17.64c-7.65-7.27-13.99-15.81-17.17-24.35c-0.94,2.98-1.45,6.05-1.55,9.14 c-1.95,2.46-4.8,5.98-8.26,10.26C31.32,61.84,4.89,94.47,2.81,101.37c-0.74,2.46-1.15,4.51-0.92,6.52 C2.13,109.95,2.98,111.78,4.72,113.63L4.72,113.63z M82.44,67.35c-2.08,1.69-4.51,3.68-7.17,5.85 C57,88.14,27.67,112.14,19.88,114.82c-1.93,0.66-3.33,1.01-4.42,0.87c-0.95-0.12-1.9-0.7-3.09-1.89l-3.54-3.54 c-1.07-1.07-1.57-2-1.68-2.96c-0.13-1.15,0.18-2.58,0.73-4.4c1.78-5.9,27.78-38.01,42.67-56.4c1.77-2.19,3.39-4.19,4.79-5.91 c1.26,6.37,4.36,12.45,9.3,17.39C69.68,63.02,75.92,66.14,82.44,67.35L82.44,67.35z"/>
            </svg>
          </button>
        </div>
        <div class="ctrl-row-bottom">
          <button class="ctrl-action-btn" id="likeBtn" onclick="likeSong()">
            <svg id="likeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
            Add to Liked
          </button>
          <button class="ctrl-action-btn" id="repeatBtn" onclick="toggleRepeat()" title="Repeat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="17 1 21 5 17 9"/>
              <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
              <polyline points="7 23 3 19 7 15"/>
              <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
            </svg>
            <span id="repeatLabel">Repeat</span>
          </button>
        </div>
      </div>

      <!-- Shuffle -->
      <div class="left-bottom">
        <button class="c-btn icon-btn" id="shuffleBtn" onclick="toggleShuffle()" title="Shuffle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="16 3 21 3 21 8"/>
            <line x1="4" y1="20" x2="21" y2="3"/>
            <polyline points="21 16 21 21 16 21"/>
            <line x1="4" y1="4" x2="9" y2="9"/>
          </svg>
          Shuffle
        </button>
      </div>

      <!-- Playlists -->
      <div class="playlists-section">
        <div class="playlists-header">Playlists</div>
        <div id="playlistList" class="playlist-list"></div>
      </div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
      <div class="right-header">
        <div class="right-header-left">
          <div class="playlist-title" id="playlistTitle">Select a playlist</div>
          <div class="playlist-subtitle">
            <span id="songCount">0 songs</span>
            <span class="sep">•</span>
            <span id="runtime">—</span>
          </div>
          <div class="playlist-genre" id="playlistGenre"></div>
        </div>
        <div class="right-header-right">
          <button class="add-folder-btn" onclick="addFolder()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
              <line x1="12" y1="11" x2="12" y2="17"/>
              <line x1="9" y1="14" x2="15" y2="14"/>
            </svg>
            Add Folder
          </button>
        </div>
      </div>

      <!-- Search Bar -->
      <div class="search-bar-row">
        <div class="search-input-wrap" id="searchInputWrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="searchInput" class="search-input" placeholder="Search tracks…" autocomplete="off" spellcheck="false">
          <button class="search-clear" id="searchClear" onclick="clearSearch()" aria-label="Clear search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <label class="overall-toggle" id="overallToggleLabel" title="Search across all playlists">
          <span class="overall-label">Overall</span>
          <div class="toggle-track" id="overallToggleTrack">
            <div class="toggle-thumb" id="overallToggleThumb"></div>
          </div>
          <input type="checkbox" id="overallToggle" style="display:none" onchange="onOverallToggle()">
        </label>
      </div>

      <div class="track-header">
        <span></span>
        <span>Title</span>
        <span id="trackHeaderAlbum">Album</span>
        <span style="text-align:right">Time</span>
        <span></span>
      </div>

      <!-- Track list + Lyrics panel share the same space -->
      <div class="right-content-area">
        <div id="trackList" class="track-list"></div>

        <!-- Lyrics Panel (hidden by default, slides up over track list) -->
        <div id="lyricsPanel" class="lyrics-panel" style="display:none">
          <div class="lyrics-close-btn" onclick="closeLyricsView()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </div>
          <div id="lyricsLines" class="lyrics-lines"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- Generic Context Menu (track + playlist right-click) -->
  <div id="ctxMenu" class="ctx-menu" style="display:none"></div>

  <!-- Edit Playlist Modal -->
  <div id="editModal" class="modal-backdrop" style="display:none">
    <div class="modal">
      <h3>Edit Playlist</h3>
      <div class="modal-field">
        <label>Cover Image</label>
        <div class="modal-cover-preview" id="modalCoverPreview" onclick="pickCover()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
        </div>
      </div>
      <div class="modal-field">
        <label>Playlist Name</label>
        <input type="text" id="modalNameInput" placeholder="Playlist name…">
      </div>
      <div class="modal-actions">
        <button class="modal-btn" onclick="closeModal()">Cancel</button>
        <button class="modal-btn primary" onclick="savePlaylistEdit()">Save</button>
      </div>
    </div>
  </div>

  <!-- Scribe Editor -->
  <div id="scribeEditorBackdrop" class="scribe-editor-backdrop" style="display:none" onclick="if(event.target===this)closeScribeEditor()">
    <div class="scribe-editor-modal">
      <div class="scribe-editor-header">
        <div class="scribe-editor-title-row">
          <svg class="scribe-header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
          <span id="scribeEditorTitle">Scribe</span>
        </div>
        <button class="scribe-close-btn" onclick="closeScribeEditor()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="scribe-editor-hint">Paste or type SRT-format lyrics. Each block: index, timecode, then text.</div>
      <textarea id="scribeTextarea" class="scribe-textarea" placeholder="1&#10;00:00:01,000 --> 00:00:04,000&#10;First line of lyrics&#10;&#10;2&#10;00:00:04,500 --> 00:00:08,000&#10;Second line of lyrics&#10;&#10;..."></textarea>
      <div class="scribe-editor-footer">
        <button class="modal-btn" onclick="closeScribeEditor()">Cancel</button>
        <button class="modal-btn primary scribe-save-btn" onclick="saveScribe()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
          Save Scribe
        </button>
      </div>
    </div>
  </div>

  <input type="file" id="coverFilePicker" accept="image/*" style="display:none" onchange="onCoverPicked(event)">

  <!-- Metadata Editor -->
  <div id="metaEditorBackdrop" class="meta-editor-backdrop" style="display:none" onclick="if(event.target===this)closeMetadataEditor()">
    <div class="meta-editor-modal">

      <div class="meta-editor-header">
        <div class="meta-editor-title-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <span>Edit Metadata</span>
        </div>
        <button class="scribe-close-btn" onclick="closeMetadataEditor()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="meta-editor-body">

        <!-- Fields column -->
        <div class="meta-fields">
          <div class="meta-field">
            <label>Title</label>
            <input type="text" id="metaTitleInput" placeholder="Track title…" autocomplete="off" spellcheck="false">
          </div>
          <div class="meta-field">
            <label>Artist</label>
            <input type="text" id="metaArtistInput" placeholder="Artist name…" autocomplete="off" spellcheck="false">
          </div>
          <div class="meta-field meta-field-row">
            <div class="meta-field" style="flex:1">
              <label>Year</label>
              <input type="text" id="metaYearInput" placeholder="2024" maxlength="4" autocomplete="off" spellcheck="false">
            </div>
            <div class="meta-field" style="flex:1">
              <label>Genre</label>
              <input type="text" id="metaGenreInput" placeholder="Genre…" autocomplete="off" spellcheck="false">
            </div>
          </div>
        </div>

        <!-- Cover column -->
        <div class="meta-cover-col">
          <label class="meta-cover-label">Cover</label>
          <!--
            Left-click  → open file picker
            Right-click → show paste context menu
          -->
          <div class="meta-cover-preview" id="metaCoverPreview"
               onclick="metaPickCover()"
               oncontextmenu="showMetaCoverCtxMenu(event)">
            <div class="meta-cover-placeholder">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                <path d="M9 18V5l12-2v13"/>
                <circle cx="6" cy="18" r="3"/>
                <circle cx="18" cy="16" r="3"/>
              </svg>
              <span>Click to set cover</span>
            </div>
          </div>
        </div>

      </div>

      <div class="meta-editor-footer">
        <button class="modal-btn" onclick="closeMetadataEditor()">Cancel</button>
        <button class="modal-btn primary" onclick="saveMetadata()">Save</button>
      </div>

    </div>
  </div>

  <!-- Cover right-click context menu -->
  <div id="metaCoverCtxMenu" class="ctx-menu cover-ctx-menu" style="display:none">
    <div class="ctx-item" onclick="metaPasteCover()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
      </svg>
      Paste Cover
    </div>
    <div class="ctx-item" onclick="metaPickCover(); document.getElementById('metaCoverCtxMenu').style.display='none'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Browse File…
    </div>
  </div>

  <input type="file" id="metaCoverFilePicker" accept="image/*" style="display:none" onchange="onMetaCoverPicked(event)">

  <script src="./node_modules/howler/dist/howler.js"></script>
  <script src="./src/renderer.js"></script>
</body>
</html>
